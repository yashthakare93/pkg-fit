spring.application.name=pkg-fit
spring.main.web-application-type=none
pkgfit.registry.url=https://registry.npmjs.org/
pkgfit.registry.connect-timeout=5s
pkgfit.registry.read-timeout=10s
logging.level.com.pkgfit=WARN
logging.level.org.jline=ERROR
logging.pattern.console=%msg%n
spring.main.banner-mode=off
